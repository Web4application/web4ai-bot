version: "3.9"

services:
  bot:
    build: .
    ports:
      - "3000:3000"
    environment:
      APP_ID: ${APP_ID}
      PRIVATE_KEY: ${PRIVATE_KEY}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}

services:

  api:
    build: ./apps/api
    ports:
      - "8000:8000"

  bot:
    build: ./apps/github-app
    ports:
      - "3000:3000"

  postgres:
    image: postgres:16

  redis:
    image: redis:7
